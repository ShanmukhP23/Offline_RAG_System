services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - LLM_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ollama_check

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Dummy service to wait for host ollama or you can run ollama containerized
  ollama_check:
    image: alpine:latest
    command: sh -c "echo 'Assuming Ollama is running on host at port 11434'; sleep 2"
